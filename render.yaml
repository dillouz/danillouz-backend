# Render Blueprint — provisions the database + backend in one step.
databases:
  - name: danillouz-db
    plan: free

services:
  - name: danillouz-backend
    type: web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: danillouz-db
          property: connectionString
      - key: ADMIN_PASSWORD      # you set this in the dashboard (not stored in code)
        sync: false
      - key: MAILERLITE_TOKEN    # optional, add later for auto-emails
        sync: false
      - key: MAILERLITE_GROUP_ID
        value: "191708280833181522"
      - key: ALLOWED_ORIGIN
        value: "https://join.danillouz.com"
